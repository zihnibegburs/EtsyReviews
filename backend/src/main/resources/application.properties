spring.application.name=EtsyBackend

# Server Configuration (Render sets PORT env variable)
server.port=${PORT:8081}

# Database Configuration (use DATABASE_URL from Render)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/etsy_extension}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth2 — Chrome Extension client ID (manifest.json oauth2.client_id ile aynı olmalı)
google.oauth2.client-id=${GOOGLE_CLIENT_ID}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Admin API (manual subscription grants)
app.admin-api-key=${ADMIN_API_KEY:}

# Lemon Squeezy Configuration
lemonsqueezy.api-key=${LEMONSQUEEZY_API_KEY}
lemonsqueezy.store-id=${LEMONSQUEEZY_STORE_ID}
lemonsqueezy.webhook-secret=${LEMONSQUEEZY_WEBHOOK_SECRET}
lemonsqueezy.variant-id-monthly=${LEMONSQUEEZY_VARIANT_ID_MONTHLY}
lemonsqueezy.variant-id-yearly=${LEMONSQUEEZY_VARIANT_ID_YEARLY}
lemonsqueezy.success-url=${LEMONSQUEEZY_SUCCESS_URL:http://localhost:8081/checkout/success?success=1}
lemonsqueezy.cancel-url=${LEMONSQUEEZY_CANCEL_URL:http://localhost:8081/checkout/cancel}

# CORS — backend artık chrome-extension://* pattern'ini kod içinde kabul ediyor
# Bu değişken isteğe bağlıdır; Render'da tanımlamanız gerekmez

# Swagger — default UI path (/swagger-ui/index.html)
springdoc.api-docs.path=/api-docs
swagger.username=${SWAGGER_USERNAME:admin}
swagger.password=${SWAGGER_PASSWORD:}

# Render keep-alive: dışarıdan GitHub Actions cron ile yapılır (.github/workflows/render-keep-alive.yml)
# Uygulama kendi kendine ping atmaz — uyuyan instance iç cron ile uyanmaz.
app.health-check.enabled=false

