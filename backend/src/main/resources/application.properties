spring.application.name=EtsyBackend

# Server Configuration (Render sets PORT env variable)
server.port=${PORT:8081}

# Database Configuration (use DATABASE_URL from Render)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/etsy_extension}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/api/auth/callback/google}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.price-id-monthly=${STRIPE_PRICE_ID_MONTHLY}
stripe.price-id-yearly=${STRIPE_PRICE_ID_YEARLY}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:8081/checkout/success?session_id={CHECKOUT_SESSION_ID}}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:8081/checkout/cancel}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:chrome-extension://*,http://localhost:3000,http://localhost:5173}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

