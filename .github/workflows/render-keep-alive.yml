name: Render Keep Alive

on:
  schedule:
    # Her 10 dakikada bir — Render ~15 dk hareketsizlikte uyur
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          URL="${HEALTH_URL:-https://etsy-backend-u3x2.onrender.com/health}"
          echo "Pinging $URL at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for attempt in 1 2 3; do
            if curl -fsS --max-time 90 "$URL"; then
              echo ""
              echo "Keep-alive OK (attempt $attempt)"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying..."
            sleep 10
          done

          echo "Keep-alive failed after 3 attempts"
          exit 1
