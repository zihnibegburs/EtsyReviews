version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: etsy-postgres
    environment:
      POSTGRES_DB: etsy_extension
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etsy-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etsy-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/etsy_extension
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-secret-key-change-this-in-production-minimum-32-characters-required
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PADDLE_VENDOR_ID: ${PADDLE_VENDOR_ID}
      PADDLE_API_KEY: ${PADDLE_API_KEY}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      - postgres
    networks:
      - etsy-network

volumes:
  postgres_data:

networks:
  etsy-network:
    driver: bridge
