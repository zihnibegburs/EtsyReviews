<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etsy Reviews Export</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        body {
            background: var(--color-bg);
            padding: 8px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            background: var(--color-surface);
            padding: 20px 12px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-top h1 {
            color: var(--color-text);
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 0;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }

        .header-info {
            display: flex;
            gap: 32px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 11px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 500;
        }

        .info-value {
            font-size: 20px;
            color: var(--color-text);
            font-weight: 700;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        .info-value.compact {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
        }

        .info-item-ratings {
            flex: 1 1 100%;
            min-width: 280px;
        }

        .rating-counts {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .rating-counts.is-empty {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text);
            margin-top: 4px;
        }

        .rating-count-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 72px;
            padding: 10px 14px;
            background: var(--color-bg);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
        }

        .rating-count-stars {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .rating-count-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .rating-count-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .export-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .export-format-select {
            padding: 10px 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text);
            background: var(--color-surface);
            cursor: pointer;
        }

        .export-format-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px var(--color-primary-muted);
        }

        .btn-export {
            background: var(--color-primary);
            color: white;
        }

        .btn-export:hover:not(:disabled) {
            background: var(--color-primary-hover);
        }

        .btn-export:disabled {
            background: var(--color-border);
            color: var(--color-text-muted);
            cursor: not-allowed;
        }

        .btn-stop {
            background: #e74c3c;
            color: white;
        }

        .btn-stop:hover {
            background: #c0392b;
        }

        .btn-premium {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-premium:hover {
            opacity: 0.92;
        }

        #loading .loading-actions {
            margin-top: 20px;
        }

        #loading {
            background: var(--color-surface);
            padding: 40px 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .loading-stats {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin: 20px 0 8px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #f0f3ff 0%, #e8f4fd 100%);
            border: 2px solid var(--color-primary);
            border-radius: var(--radius-md);
        }

        .loading-count {
            font-size: 42px;
            font-weight: 800;
            color: var(--color-primary);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .loading-count-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        #loading p {
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        #loading .hint {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 8px;
        }

        .spinner {
            border: 3px solid var(--color-border);
            border-top: 3px solid var(--color-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #reviews {
            background: var(--color-surface);
            padding: 4px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--color-bg);
        }

        th {
            padding: 11px 14px;
            text-align: left;
            color: var(--color-text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        td {
            padding: 11px 14px;
            border-top: 1px solid var(--color-border-light);
            font-size: 13px;
            color: var(--color-text);
        }

        tr:hover td {
            background: #FDFDFD;
        }

        .review-rating {
            color: #E8A317;
            font-size: 14px;
        }

        .review-number {
            color: var(--color-text-muted);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            text-align: center;
            width: 48px;
        }

        .review-item a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .review-item a:hover {
            text-decoration: underline;
        }

        #pagination-controls {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        #pagination-controls span {
            padding: 6px 11px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition);
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        #pagination-controls span:hover {
            background: var(--color-bg);
        }

        #pagination-controls span.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .error {
            background: var(--color-danger-bg);
            color: var(--color-danger);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            margin: 16px 0;
            font-size: 14px;
        }

        .warning {
            background: var(--color-warning-bg);
            color: var(--color-warning);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            margin: 16px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>Etsy Reviews Export</h1>
                <div class="header-actions">
                    <button id="premiumBtn" class="btn-premium" style="display: none;">Get Premium Subscription</button>
                    <div class="export-controls">
                        <select id="exportFormat" class="export-format-select" aria-label="Export format">
                            <option value="csv">CSV</option>
                            <option value="xlsx">XLSX</option>
                        </select>
                        <button id="exportBtn" class="btn-export" disabled>Export All</button>
                    </div>
                </div>
            </div>
            <div class="header-info">
                <div class="info-item">
                    <span class="info-label">Listing ID</span>
                    <span class="info-value" id="displayListingId">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Shop ID</span>
                    <span class="info-value" id="displayShopId">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Etsy Total Reviews</span>
                    <span class="info-value" id="etsyTotalReviews">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Average Rating</span>
                    <span class="info-value" id="averageRating">-</span>
                </div>
                <div class="info-item info-item-ratings">
                    <span class="info-label">Rating Breakdown</span>
                    <div class="rating-counts is-empty" id="ratingCounts">-</div>
                </div>
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <div class="loading-stats">
                <span class="loading-count" id="loadingTotalReviews">0</span>
                <span class="loading-count-label">Total Reviews Collected</span>
            </div>
            <p>Fetching reviews from Etsy...</p>
            <p class="hint">This may take a few minutes</p>
        </div>

        <div id="reviews"></div>
        <div id="pagination-controls"></div>
    </div>

    <script src="vendor/xlsx.mini.min.js"></script>
    <script src="utils/config.js"></script>
    <script src="output.js"></script>
</body>
</html>
