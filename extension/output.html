<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etsy Reviews Export</title>
    <link rel="icon" href="icons/icon48.png" type="image/png">
    <link rel="stylesheet" href="styles/common.css">
    <style>
        body {
            background: var(--color-bg);
            padding: 8px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            background: var(--color-surface);
            padding: 20px 12px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title img {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
        }

        .header-top h1 {
            color: var(--color-text);
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 0;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }

        .header-info {
            display: flex;
            gap: 32px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 11px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 500;
        }

        .info-value {
            font-size: 20px;
            color: var(--color-text);
            font-weight: 700;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        .info-value.compact {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
        }

        .info-item-ratings {
            flex: 1 1 100%;
            min-width: 280px;
        }

        .rating-counts {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .rating-counts.is-empty {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text);
            margin-top: 4px;
        }

        .rating-count-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 72px;
            padding: 10px 14px;
            background: var(--color-bg);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
        }

        .rating-count-stars {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .rating-count-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .rating-count-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .export-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .export-format-select {
            padding: 10px 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text);
            background: var(--color-surface);
            cursor: pointer;
        }

        .export-format-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px var(--color-primary-muted);
        }

        .btn-export {
            background: var(--color-primary);
            color: white;
        }

        .btn-export:hover:not(:disabled) {
            background: var(--color-primary-hover);
        }

        .btn-export:disabled {
            background: var(--color-border);
            color: var(--color-text-muted);
            cursor: not-allowed;
        }

        .btn-stop {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 22px;
            border: 1.5px solid rgba(192, 57, 43, 0.2);
            border-radius: var(--radius-full);
            background: var(--color-danger-bg);
            color: var(--color-danger);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition), transform var(--transition);
        }

        .btn-stop:hover:not(:disabled) {
            background: var(--color-danger);
            color: #fff;
            border-color: var(--color-danger);
            box-shadow: 0 4px 14px rgba(192, 57, 43, 0.22);
            transform: translateY(-1px);
        }

        .btn-stop:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-stop:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .btn-resume {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--color-primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
        }

        .btn-resume:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 4px 14px rgba(241, 100, 30, 0.28);
            transform: translateY(-1px);
        }

        .btn-resume:active {
            transform: translateY(0);
        }

        .cancelled-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            background: var(--color-warning-bg);
            border: 1px solid rgba(180, 83, 9, 0.18);
            color: var(--color-warning);
            padding: 14px 18px;
            border-radius: var(--radius-md);
            margin: 16px 0;
        }

        .cancelled-banner-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 14px;
        }

        .cancelled-banner-text strong {
            color: #92400e;
            font-size: 15px;
        }

        #loading .loading-actions {
            margin-top: 20px;
        }

        .btn-premium {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-premium:hover {
            opacity: 0.92;
        }

        #loading {
            background: var(--color-surface);
            padding: 40px 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .loading-stats {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin: 20px 0 8px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #f0f3ff 0%, #e8f4fd 100%);
            border: 2px solid var(--color-primary);
            border-radius: var(--radius-md);
        }

        .loading-count {
            font-size: 42px;
            font-weight: 800;
            color: var(--color-primary);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .loading-count-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        #loading p {
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        #loading .hint {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 8px;
        }

        .spinner {
            border: 3px solid var(--color-border);
            border-top: 3px solid var(--color-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #reviews {
            background: var(--color-surface);
            padding: 4px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--color-bg);
        }

        th {
            padding: 11px 14px;
            text-align: left;
            color: var(--color-text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        td {
            padding: 11px 14px;
            border-top: 1px solid var(--color-border-light);
            font-size: 13px;
            color: var(--color-text);
        }

        tr:hover td {
            background: #FDFDFD;
        }

        .review-rating {
            color: #E8A317;
            font-size: 14px;
        }

        .review-number {
            color: var(--color-text-muted);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            text-align: center;
            width: 48px;
        }

        .review-item a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .review-item a:hover {
            text-decoration: underline;
        }

        .review-text {
            max-width: 360px;
        }

        .review-photo {
            margin-top: 8px;
        }

        .review-photo img {
            display: block;
            max-width: 120px;
            max-height: 120px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border-light);
            object-fit: cover;
        }

        #pagination-controls {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        #pagination-controls span {
            padding: 6px 11px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition);
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        #pagination-controls span:hover {
            background: var(--color-bg);
        }

        #pagination-controls span.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .error {
            background: var(--color-danger-bg);
            color: var(--color-danger);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            margin: 16px 0;
            font-size: 14px;
        }

        .warning {
            background: var(--color-warning-bg);
            color: var(--color-warning);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            margin: 16px 0;
            font-size: 14px;
        }

        #analytics {
            background: var(--color-surface);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
            display: none;
        }

        #analytics.is-visible {
            display: block;
        }

        .analytics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .analytics-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text);
        }

        .analytics-subtitle {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--color-text-muted);
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .analytics-stat {
            background: var(--color-bg);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            padding: 14px;
        }

        .analytics-stat-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .analytics-stat-value {
            margin-top: 6px;
            font-size: 22px;
            font-weight: 700;
            color: var(--color-text);
            font-variant-numeric: tabular-nums;
        }

        .analytics-panels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .analytics-panel {
            background: var(--color-bg);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .analytics-panel h3 {
            margin: 0 0 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .rating-bar-row {
            display: grid;
            grid-template-columns: 52px 1fr 36px;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .rating-bar-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        .rating-bar-track {
            height: 10px;
            background: var(--color-border-light);
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        .rating-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #E8A317, #F1641E);
            border-radius: var(--radius-full);
            min-width: 0;
            transition: width 0.3s ease;
        }

        .rating-bar-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-muted);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .month-bar-row {
            display: grid;
            grid-template-columns: 72px 1fr 32px;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .month-bar-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        .month-bar-fill {
            background: var(--color-primary);
        }

        .month-bars-toggle {
            display: block;
            width: 100%;
            margin-top: 4px;
            padding: 8px 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface);
            color: var(--color-primary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background 0.15s ease;
        }

        .month-bars-toggle:hover {
            background: var(--color-bg);
        }

        .keyword-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .keyword-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-size: 12px;
            color: var(--color-text);
        }

        .keyword-tag-count {
            font-weight: 700;
            color: var(--color-primary);
        }

        .analytics-empty {
            font-size: 13px;
            color: var(--color-text-muted);
        }

        .analytics-panel-premium.is-locked {
            position: relative;
        }

        .premium-locked-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            min-height: 140px;
            padding: 20px 12px;
            background: linear-gradient(180deg, var(--color-primary-light) 0%, var(--color-surface) 100%);
            border: 1px dashed var(--color-primary);
            border-radius: var(--radius-md);
        }

        .premium-lock-badge {
            display: inline-block;
            background: var(--color-primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 3px 10px;
            border-radius: var(--radius-full);
        }

        .premium-locked-content p {
            margin: 0;
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.5;
            max-width: 220px;
        }

        .premium-unlock-btn {
            margin-top: 4px;
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--color-primary);
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }

        .premium-unlock-btn:hover {
            background: var(--color-primary-hover);
        }

        .analytics-panel-premium h3 .pro-only-badge {
            display: inline-block;
            margin-left: 6px;
            padding: 2px 7px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: white;
            background: var(--color-primary);
            border-radius: var(--radius-full);
            vertical-align: middle;
        }

        .review-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 14px;
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            background: var(--color-surface);
            box-shadow: var(--shadow-sm);
            margin-bottom: 8px;
        }

        .review-filters.hidden {
            display: none;
        }

        .filter-chip {
            padding: 6px 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            background: var(--color-surface);
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition), color var(--transition);
        }

        .filter-chip:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .filter-chip.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="header-title">
                    <img src="icons/icon48.png" alt="Etsy Reviews Export" width="40" height="40">
                    <h1>Etsy Reviews Export</h1>
                </div>
                <div class="header-actions">
                    <button id="premiumBtn" class="btn-premium" style="display: none;">Get Premium Subscription</button>
                    <div class="export-controls">
                        <select id="exportFormat" class="export-format-select" aria-label="Export format">
                            <option value="csv">CSV</option>
                            <option value="xlsx">XLSX</option>
                        </select>
                        <button id="exportBtn" class="btn-export" disabled>Export All</button>
                    </div>
                </div>
            </div>
            <div class="header-info">
                <div class="info-item">
                    <span class="info-label">Listing ID</span>
                    <span class="info-value" id="displayListingId">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Shop ID</span>
                    <span class="info-value" id="displayShopId">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Etsy Total Reviews</span>
                    <span class="info-value" id="etsyTotalReviews">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Average Rating</span>
                    <span class="info-value" id="averageRating">-</span>
                </div>
                <div class="info-item info-item-ratings">
                    <span class="info-label">Rating Breakdown</span>
                    <div class="rating-counts is-empty" id="ratingCounts">-</div>
                </div>
            </div>
        </div>

        <div id="analytics">
            <div class="analytics-header">
                <div>
                    <h2>Review Analytics</h2>
                    <p class="analytics-subtitle">Insights from collected reviews</p>
                </div>
            </div>
            <div class="analytics-grid" id="analyticsStats"></div>
            <div class="analytics-panels">
                <div class="analytics-panel">
                    <h3>Rating Distribution</h3>
                    <div id="ratingDistribution"></div>
                </div>
                <div class="analytics-panel analytics-panel-premium" id="premiumPanelMonth">
                    <h3>Reviews by Month<span class="pro-only-badge hidden" id="monthProBadge">PRO</span></h3>
                    <div id="reviewsByMonth"></div>
                </div>
                <div class="analytics-panel analytics-panel-premium" id="premiumPanelKeywords">
                    <h3>Top Keywords<span class="pro-only-badge hidden" id="keywordsProBadge">PRO</span></h3>
                    <div id="topKeywords"></div>
                </div>
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <div class="loading-stats">
                <span class="loading-count" id="loadingTotalReviews">0</span>
                <span class="loading-count-label">Total Reviews Collected</span>
            </div>
            <p>Fetching reviews from Etsy...</p>
            <p class="hint">This may take a few minutes</p>
        </div>

        <div id="reviewFilters" class="review-filters hidden"></div>

        <div id="reviews"></div>
        <div id="pagination-controls"></div>
    </div>

    <script src="vendor/xlsx.mini.min.js"></script>
    <script src="utils/config.js"></script>
    <script src="utils/subscription.js"></script>
    <script src="utils/reviewAnalytics.js"></script>
    <script src="output.js"></script>
</body>
</html>
