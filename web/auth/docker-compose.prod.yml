version: "3.9"
services:
  db:
    image: postgres:15-alpine
    container_name: next_oauth_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oauth
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next_oauth_web_prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      GOOGLE_CLIENT_ID_WEB: ${GOOGLE_CLIENT_ID_WEB}
      GOOGLE_CLIENT_SECRET_WEB: ${GOOGLE_CLIENT_SECRET_WEB}
      GOOGLE_REDIRECT_URI: "https://api.example.com/api/auth/google/callback"
      SESSION_COOKIE_NAME: sid
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_URL: "postgresql://postgres:postgres@db:5433/oauth?schema=public"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata_prod:
